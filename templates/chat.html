{% extends "base.html" %}

{% block content_class %}chat-page-wrapper{% endblock %}

{% block content %}
<div class="chat-window-integrated">
    <div class="integrated-header">
        <h1>ACADEMIC AI ASSISTANT</h1>
        
        <!-- Context Mode Toggle -->
        <div class="context-mode-wrapper hidden" id="context-wrapper">
            <div class="context-toggle-container">
                <button class="context-tab active" id="mode-general-btn">🤖 Tutor</button>
                <button class="context-tab" id="mode-notes-btn">📄 Notes Context</button>
            </div>
            <div class="context-info-text" id="context-info">Active Context: <strong id="context-topic-name">None</strong></div>
        </div>

        <div class="status-indicator">
            <span class="dot"></span> SECURE NEURAL LINK
        </div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message-bubble ai-bubble">
            Hello! I am your AI Study Partner. How can I help you today?
        </div>
    </div>

    <div class="chat-input-wrapper">
        <input type="text" id="chat-input" class="styled-input" placeholder="Query the academic engine..." autocomplete="off">
        <button id="send-btn" class="send-btn" title="Send message" aria-label="Send message">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');
    
    // Toggle DOM elements
    const contextWrapper = document.getElementById('context-wrapper');
    const modeGeneralBtn = document.getElementById('mode-general-btn');
    const modeNotesBtn = document.getElementById('mode-notes-btn');
    const contextTopicName = document.getElementById('context-topic-name');
    
    let chatMode = 'general'; // 'general' or 'notes'
    let currentTopic = '';
    let isLoading = false;

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message-bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
        
        if (isUser) {
            msgDiv.innerText = text;
        } else {
            msgDiv.innerHTML = marked.parse(text);
        }
        
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msgDiv;
    }

    function showTypingIndicator() {
        const bubble = document.createElement('div');
        bubble.className = 'typing-bubble';
        bubble.id = 'typing-indicator';
        bubble.innerHTML = `
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        `;
        chatMessages.appendChild(bubble);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();
    }

    async function handleSend() {
        if (isLoading) return;
        const message = chatInput.value.trim();
        if (!message) return;

        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.style.opacity = '0.5';

        addMessage(message, true);
        chatInput.value = '';
        showTypingIndicator();

        const isNotes = chatMode === 'notes';
        const url = isNotes ? '/api/rag-chat' : '/api/chat';
        const payload = isNotes ? { query: message } : { message };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            removeTypingIndicator();
            addMessage(data.response, false);
        } catch (error) {
            removeTypingIndicator();
            addMessage("Sorry, the neural link was interrupted. Please re-engage.", false);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.style.opacity = '';
        }
    }

    // Set active chat mode
    function setChatMode(mode) {
        chatMode = mode;
        if (mode === 'notes') {
            modeGeneralBtn.classList.remove('active');
            modeNotesBtn.classList.add('active');
            chatInput.placeholder = `Query notes context: "${currentTopic}"...`;
        } else {
            modeGeneralBtn.classList.add('active');
            modeNotesBtn.classList.remove('active');
            chatInput.placeholder = "Query the academic engine...";
        }
    }

    // Check document status and configure toggle
    async function checkDocumentStatus() {
        try {
            const res = await fetch('/api/document-status');
            const data = await res.json();
            
            if (data.has_document) {
                currentTopic = data.topic;
                contextTopicName.innerText = currentTopic;
                contextWrapper.classList.remove('hidden');
                
                // Parse URL parameter and set mode or auto-run
                const urlParams = new URLSearchParams(window.location.search);
                const modeParam = urlParams.get('mode');
                
                if (modeParam === 'notes') {
                    setChatMode('notes');
                    addMessage(`**Notes Context Loaded:** Connected to the study materials for **"${currentTopic}"**. Ask me anything about this document!`, false);
                }
            }
        } catch (e) {
            console.error("Failed to fetch document status:", e);
        }
    }

    // Toggle event listeners
    modeGeneralBtn.addEventListener('click', () => setChatMode('general'));
    modeNotesBtn.addEventListener('click', () => setChatMode('notes'));

    sendBtn.addEventListener('click', handleSend);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });

    // Initialize document check on load
    checkDocumentStatus();
</script>
{% endblock %}
